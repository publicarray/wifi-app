name: Wails build

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:
  release:
    types: [created, published]

jobs:
  test:
    name: Test & lint (Linux)
    runs-on: ubuntu-24.04
    env:
      LINUX_WAILS_TAGS: webkit2_41
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        # ubuntu-latest currently tracks Ubuntu 24.04, where WebKitGTK moved
        # from the 4.0 development package to 4.1.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build frontend assets
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: go vet
        run: go vet -tags "${LINUX_WAILS_TAGS}" ./...

      - name: go test -race
        run: go test -tags "${LINUX_WAILS_TAGS}" -race -count=1 ./...

      - name: Install staticcheck
        # Installed fresh per-run rather than pinned: staticcheck releases
        # follow Go releases closely and an out-of-date binary fails to read
        # newer Go .a files. Bump go-version above to bump the toolchain.
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: $(go env GOPATH)/bin/staticcheck -tags "${LINUX_WAILS_TAGS}" ./...

      - name: Cross-compile sanity (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build ./...

      - name: Cross-compile sanity (darwin/arm64, no cgo)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Cross-compile sanity (darwin/amd64, no cgo)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        build:
          [
            {
              name: wifi-app,
              platform: linux/amd64,
              os: ubuntu-24.04,
              out: wifi-app-linux-amd64,
              tags: webkit2_41,
            },
            {
              name: wifi-app.exe,
              platform: windows/amd64,
              os: windows-latest,
              out: wifi-app-windows-amd64.exe,
            },
            {
              name: wifi-app,
              platform: darwin/universal,
              os: macos-latest,
              out: wifi-app-macos-universal.zip,
            },
          ]
    runs-on: ${{ matrix.build.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - uses: snider/build@main
        if: matrix.build.tags
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          build-tags: ${{ matrix.build.tags }}

      - uses: snider/build@main
        if: ${{ !matrix.build.tags }}
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}

      # -------------------------
      # Rename binaries
      # -------------------------
      - name: Rename binary (unix)
        if: runner.os == 'Linux'
        run: |
          mv build/bin/${{ matrix.build.name }} build/bin/${{ matrix.build.out }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item build\bin\${{ matrix.build.name }} build\bin\${{ matrix.build.out }}

      - name: Rename macOS zip
        if: runner.os == 'macOS'
        run: |
          mv build/bin/${{ matrix.build.name }}.app.zip build/bin/${{ matrix.build.out }}

      # -------------------------
      # Upload binaries to GitHub Release
      # -------------------------
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: build/bin/${{ matrix.build.out }}
