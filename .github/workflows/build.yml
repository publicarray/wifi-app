name: Wails build

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:
  release:
    types: [created, published]

jobs:
  test:
    name: Test & lint (Linux)
    runs-on: ubuntu-24.04
    env:
      LINUX_WAILS_TAGS: webkit2_41
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        # ubuntu-latest currently tracks Ubuntu 24.04, where WebKitGTK moved
        # from the 4.0 development package to 4.1.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build frontend assets
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: go vet
        run: go vet -tags "${LINUX_WAILS_TAGS}" ./...

      - name: go test -race
        run: go test -tags "${LINUX_WAILS_TAGS}" -race -count=1 ./...

      - name: Install staticcheck
        # Installed fresh per-run rather than pinned: staticcheck releases
        # follow Go releases closely and an out-of-date binary fails to read
        # newer Go .a files. Bump go-version above to bump the toolchain.
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: $(go env GOPATH)/bin/staticcheck -tags "${LINUX_WAILS_TAGS}" ./...

      - name: Cross-compile sanity (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build ./...

      - name: Cross-compile sanity (darwin/arm64, no cgo)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Cross-compile sanity (darwin/amd64, no cgo)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build ./...

  macos-cgo:
    # Compile + dlopen smoke test for the optional Apple80211 helper. The
    # GitHub Actions macOS runner has no WiFi hardware (en0 is wired
    # virtio/AWS Nitro), so we cannot exercise the actual scan path. We
    # *can* validate that the helper builds with cgo, links against
    # CoreFoundation/Foundation, and dlopens the private framework — which
    # is where most ABI surprises bite. The helper is expected to fail
    # bind/scan; the smoke test only asserts that the framework loaded and
    # symbols resolved (i.e. dlopen succeeded), not that the scan worked.
    name: macOS cgo smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        # main.go uses `//go:embed all:frontend/dist`, so any `go build|vet|test`
        # over the main package needs a populated frontend/dist directory.
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: go vet (darwin, cgo)
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: go test (darwin, cgo)
        env:
          CGO_ENABLED: "1"
        # Tests are platform-agnostic IE parsers; running them under the
        # darwin toolchain catches accidental Linux-only assumptions.
        run: go test -count=1 ./...

      - name: Build helper (darwin, cgo)
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p build/bin
          go build -o build/bin/wifi-app-mac-helper ./cmd/wifi-app-mac-helper

      - name: dlopen smoke test
        # Run the helper. Expected to either succeed (highly unlikely on a
        # CI runner without WiFi hardware) or fail at bind/scan with a
        # specific error string. A dlopen failure or missing-symbol error
        # is the actual regression we want to catch — that means we picked
        # wrong symbol names or Apple changed the framework path. Pass the
        # job in the bind/scan-failure case; fail it otherwise.
        run: |
          set +e
          out=$(./build/bin/wifi-app-mac-helper -iface en0 2>&1)
          rc=$?
          echo "helper exit code: $rc"
          echo "helper output:"
          echo "$out"
          if [ $rc -eq 0 ]; then
            echo "helper succeeded (unexpected on CI but not a failure)"
            exit 0
          fi
          # Acceptable failures: the framework loaded and symbols resolved
          # but the WiFi-specific calls had nothing to talk to.
          if echo "$out" | grep -qE "Apple80211BindToInterface failed|Apple80211Scan/GetCachedScanResults failed|Apple80211Open failed"; then
            echo "dlopen + symbol resolution succeeded; bind/scan failed as expected on CI"
            exit 0
          fi
          # Hard failures: framework or symbol lookup broke. These are the
          # regressions worth flagging.
          if echo "$out" | grep -q "Apple80211 framework unavailable"; then
            echo "::error::dlopen failed — framework path or library validation issue"
            exit 1
          fi
          echo "::error::unexpected helper failure mode"
          exit 1

  build:
    needs: [test, macos-cgo]
    strategy:
      fail-fast: false
      matrix:
        build:
          [
            {
              name: wifi-app,
              platform: linux/amd64,
              os: ubuntu-24.04,
              out: wifi-app-linux-amd64,
              tags: webkit2_41,
            },
            {
              name: wifi-app.exe,
              platform: windows/amd64,
              os: windows-latest,
              out: wifi-app-windows-amd64.exe,
            },
            {
              name: wifi-app,
              platform: darwin/universal,
              os: macos-latest,
              out: wifi-app-macos-universal.zip,
            },
          ]
    runs-on: ${{ matrix.build.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - uses: snider/build@main
        if: matrix.build.tags
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          build-tags: ${{ matrix.build.tags }}

      - uses: snider/build@main
        if: ${{ !matrix.build.tags }}
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}

      # -------------------------
      # Rename binaries
      # -------------------------
      - name: Rename binary (unix)
        if: runner.os == 'Linux'
        run: |
          mv build/bin/${{ matrix.build.name }} build/bin/${{ matrix.build.out }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item build\bin\${{ matrix.build.name }} build\bin\${{ matrix.build.out }}

      # -------------------------
      # macOS: build the optional Apple80211 helper as a universal binary
      # and inject it into the .app bundle so users get full beacon-IE
      # data without configuring MacOSHelperPath. The main app auto-detects
      # the sibling helper via defaultMacHelperPath().
      # -------------------------
      - name: Build mac helper (universal)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: "1"
        run: |
          set -e
          mkdir -p build/helper
          # Cross-compiling cgo on macOS needs explicit -arch flags to pick
          # the right target SDK out of Xcode. Match the LSMinimumSystemVersion
          # advertised in build/darwin/Info.plist (10.13).
          GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-arch x86_64 -mmacosx-version-min=10.13" \
            CGO_LDFLAGS="-arch x86_64 -mmacosx-version-min=10.13" \
            go build -o build/helper/wifi-app-mac-helper-amd64 ./cmd/wifi-app-mac-helper
          GOOS=darwin GOARCH=arm64 \
            CGO_CFLAGS="-arch arm64 -mmacosx-version-min=11.0" \
            CGO_LDFLAGS="-arch arm64 -mmacosx-version-min=11.0" \
            go build -o build/helper/wifi-app-mac-helper-arm64 ./cmd/wifi-app-mac-helper
          lipo -create \
            build/helper/wifi-app-mac-helper-amd64 \
            build/helper/wifi-app-mac-helper-arm64 \
            -output build/helper/wifi-app-mac-helper
          file build/helper/wifi-app-mac-helper

      - name: Inject helper into .app bundle
        if: runner.os == 'macOS'
        run: |
          set -e
          # snider/build@main leaves both build/bin/<name>.app/ and the
          # already-zipped .app.zip in place. Modify the .app directory
          # directly and re-zip — unzipping over the existing tree prompts
          # for overwrite confirmation and fails under non-interactive CI.
          cd build/bin
          cp ../helper/wifi-app-mac-helper ${{ matrix.build.name }}.app/Contents/MacOS/
          chmod +x ${{ matrix.build.name }}.app/Contents/MacOS/wifi-app-mac-helper
          # Ad-hoc sign the helper with the same entitlements as the main
          # app so future hardened-runtime builds keep working; on
          # unsigned dev builds this is harmless.
          codesign --force --sign - \
            --entitlements ../../build/darwin/entitlements.plist \
            ${{ matrix.build.name }}.app/Contents/MacOS/wifi-app-mac-helper || true
          rm -f ${{ matrix.build.name }}.app.zip
          ditto -c -k --keepParent ${{ matrix.build.name }}.app ${{ matrix.build.name }}.app.zip

      - name: Rename macOS zip
        if: runner.os == 'macOS'
        run: |
          mv build/bin/${{ matrix.build.name }}.app.zip build/bin/${{ matrix.build.out }}

      # -------------------------
      # Upload binaries to GitHub Release
      # -------------------------
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: build/bin/${{ matrix.build.out }}
